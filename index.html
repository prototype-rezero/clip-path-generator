<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clip-Path-Generator</title>
    <link rel="stylesheet" href="pathgeneratorstyle.css">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:slnt,wght@-11..11,200..1000&family=Gluten:wght@100..900&family=Open+Sans:ital,wdth,wght@0,75..100,300..800;1,75..100,300..800&family=Work+Sans:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="hhlder"><h2>Precision Path Generator</h2></div>

    <div class="container">
        <div class="btn-row">
                <button class="btn-add" onclick="addPoint()">+</button>
                <button class="btn-del" onclick="deletePoint()">-</button>
            </div>
        <div class="work-area">
            <div id="canvas-container" style="width: 800px; height: 500px;">
                <div id="mask-overlay"></div>
                <svg id="svg-layer"></svg>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Canvas Width : <span id="w-val" class="val">800</span>px</label>
                <input type="range" id="w-slider" min="100" max="1920" value="800">
                <label style="margin-top:10px">Canvas Height : <span id="h-val" class="val">500</span>px</label>
                <input type="range" id="h-slider" min="100" max="1080" value="500">
            </div>

            <div class="control-group">
                <label>Corner Radius : <span id="r-val" class="val">20</span>px</label>
                <input type="range" id="r-slider" min="0" max="150" value="20">
                
                <label style="margin-top:10px">Grid Snap Size : <span id="g-val" class="val">20</span>px</label>
                <input type="range" id="g-slider" min="1" max="100" value="20">
            </div>
            
            
            <button class="btn-reset" onclick="resetPoints()">Reset Default</button>

            <div class="control-group">
                <label>Generated CSS :</label>
                <div class="code-box" id="output-code"></div>
            </div>
        </div>
    </div>

    <script src="pathgeneratorscript.js">
        
    </script>
</body>
</html>
